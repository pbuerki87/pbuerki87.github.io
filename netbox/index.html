<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetBox Device Importer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080c10;
  --panel:    #0e1318;
  --surface:  #131920;
  --surface2: #182028;
  --border:   #1e2d3d;
  --border2:  #243445;
  --accent:   #00c27a;
  --blue:     #3b9eff;
  --violet:   #a78bfa;
  --amber:    #f59e0b;
  --red:      #f87171;
  --text:     #d4dde8;
  --muted:    #4d6070;
  --label:    #7a9ab0;
  --radius:   8px;
}
:root.light {
  --bg:       #f0f4f8;
  --panel:    #ffffff;
  --surface:  #f8fafc;
  --surface2: #eef2f7;
  --border:   #d1dce8;
  --border2:  #c0cdd9;
  --accent:   #00936e;
  --blue:     #1a7fd4;
  --violet:   #7c5cbf;
  --amber:    #c47d00;
  --red:      #d94f4f;
  --text:     #1a2535;
  --muted:    #8a9eb5;
  --label:    #4d6478;
  --radius:   8px;
}

/* ── Light mode overrides ── */
:root.light input[type=text],
:root.light input[type=password],
:root.light select {
  background: #ffffff;
  border-color: #c0cdd9;
  color: #1a2535;
}
:root.light input[type=text]:focus,
:root.light input[type=password]:focus,
:root.light select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(26,127,212,.12);
}
:root.light input::placeholder { color: #a0b0c0; }
:root.light select option { background: #ffffff; color: #1a2535; }

/* Header inputs */
:root.light .conn-inputs input {
  background: #f0f4f8;
  border-color: #c0cdd9;
  color: #1a2535;
}
:root.light .conn-inputs input::placeholder { color: #8a9eb5; }

/* Section heads */
:root.light .section-head { background: #eef2f7; border-bottom-color: #d1dce8; }
:root.light .section      { background: #ffffff; border-color: #d1dce8; }
:root.light .section-body { background: #ffffff; }

/* Queue items */
:root.light .queue-item   { background: #ffffff; border-color: #d1dce8; }
:root.light .queue-item.success { background: #f0faf5; border-color: #6ecfa0; }
:root.light .queue-item.error   { background: #fff0f0; border-color: #e09090; }
:root.light .queue-item.running { background: #f0f6ff; border-color: #7ab8f0; }
:root.light .queue-name   { color: #1a2535; }

/* Tags */
:root.light .queue-tag              { background: #eef2f7; border-color: #c8d5e0; color: #4d6478; }
:root.light .queue-tag.tag-type     { background: #e8f2ff; border-color: #a0c4f0; color: #1a5a9a; }
:root.light .queue-tag.tag-iface    { background: #e6faf3; border-color: #80d4a8; color: #006845; }
:root.light .queue-tag.tag-ip       { background: #f0ecff; border-color: #c0a8f0; color: #5a3a9a; }
:root.light .queue-tag.tag-mac      { background: #fff8e6; border-color: #f0c860; color: #8a5a00; }

/* Queue status pills */
:root.light .queue-status.pending { background: #eef2f7; color: #8a9eb5; }
:root.light .queue-status.success { background: #e6faf3; color: #006845; border-color: #6ecfa0; }
:root.light .queue-status.error   { background: #fff0f0; color: #c04040; border-color: #e09090; }
:root.light .queue-status.running { background: #e8f2ff; color: #1a5a9a; border-color: #7ab8f0; }

/* Badges & toolbar */
:root.light .badge        { background: #eef2f7; border-color: #c8d5e0; color: #4d6478; }
:root.light .btn-outline  { background: #f0f4f8; border-color: #c0cdd9; color: #4d6478; }
:root.light .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
:root.light .btn-conn     { background: #eef2f7; border-color: #c0cdd9; color: #1a2535; }
:root.light .btn-conn:hover { border-color: var(--blue); color: var(--blue); }
:root.light .btn-theme    { background: #eef2f7; border-color: #c0cdd9; color: #4d6478; }

/* Log */
:root.light #log-output   { background: #f8fafc; border-color: #d1dce8; }
:root.light .log-time     { color: #8a9eb5; }
:root.light .log-ok       { color: #007a50; }
:root.light .log-info     { color: #1a5a9a; }
:root.light .log-warn     { color: #a06000; }
:root.light .log-err      { color: #c04040; }

/* Tabs */
:root.light .panel-tabs   { background: #ffffff; border-bottom-color: #d1dce8; }
:root.light .tab          { color: #8a9eb5; }
:root.light .tab.active   { color: var(--blue); border-bottom-color: var(--blue); }
:root.light .tab:hover:not(.active) { color: #1a2535; }

/* Right panel */
:root.light .right-panel  { background: #f0f4f8; }
:root.light .tab-content  { background: #f0f4f8; }

/* Hint text */
:root.light .hint-text    { color: #8a9eb5; }

/* icon-btn (delete) */
:root.light .icon-btn     { border-color: #c8d5e0; color: #8a9eb5; }
:root.light .icon-btn:hover { border-color: var(--red); color: var(--red); }

/* Empty state */
:root.light .empty-state  { border-color: #c8d5e0; color: #8a9eb5; }

/* Section icons */
:root.light .icon-device  { background: #daeeff; color: #1a5a9a; }
:root.light .icon-iface   { background: #d6f5e8; color: #006845; }
:root.light .icon-net     { background: #ece8ff; color: #5a3a9a; }
:root.light .icon-mac     { background: #fff3d0; color: #8a5a00; }

/* Progress */
:root.light .progress-bar { background: #d1dce8; }
:root.light .progress-label { color: #8a9eb5; }

/* Conn badge */
:root.light #conn-badge   { border-color: #c0cdd9; color: #8a9eb5; background: #f0f4f8; }
:root.light #conn-badge.ok  { background: #e6faf3; border-color: #6ecfa0; color: #006845; }
:root.light #conn-badge.err { background: #fff0f0; border-color: #e09090; color: #c04040; }

/* Form panel */
:root.light .form-panel   { background: #ffffff; border-right-color: #d1dce8; }
:root.light .form-footer  { background: #ffffff; border-top-color: #d1dce8; }

/* Logo */
:root.light .logo         { color: var(--accent); }
:root.light .logo-sep     { background: #d1dce8; }

/* Header */
:root.light header        { background: #ffffff; border-bottom-color: #d1dce8; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

/* ── Header ── */
header{
  height:52px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;
}
.logo{
  font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;
  color:var(--accent);letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.logo-sep{width:1px;height:18px;background:var(--border2)}
.conn-area{display:flex;align-items:center;gap:8px;margin-left:auto}
.conn-inputs{display:flex;gap:6px}
.conn-inputs input{
  background:var(--surface);border:1px solid var(--border2);border-radius:6px;
  padding:5px 10px;color:var(--text);font-family:'Geist Mono',monospace;font-size:11px;
  outline:none;transition:border-color .15s;width:220px;
}
.conn-inputs input:focus{border-color:var(--blue)}
.conn-inputs input::placeholder{color:var(--muted)}

#conn-badge{
  font-family:'Geist Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;
  border:1px solid var(--border2);color:var(--muted);display:flex;align-items:center;gap:5px;
  white-space:nowrap;transition:all .3s;
}
#conn-badge.ok {border-color:#1a5c37;background:#061a10;color:var(--accent)}
#conn-badge.err{border-color:#5c1a1a;background:#1a0606;color:var(--red)}
#conn-badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:6px 14px;border-radius:6px;border:none;cursor:pointer;
  font-family:'Geist',sans-serif;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;
}
.btn-conn{background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
.btn-conn:hover{border-color:var(--blue);color:var(--blue)}
.btn-theme{
  width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--label);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:all .15s;flex-shrink:0;
}
.btn-theme:hover{border-color:var(--blue);color:var(--blue)}

/* ── Layout ── */
.workspace{
  display:grid;grid-template-columns:500px 1fr;height:calc(100vh - 52px);overflow:hidden;
}

/* ── Left Panel: Form ── */
.form-panel{
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.form-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.form-footer{
  padding:12px 16px;border-top:1px solid var(--border);background:var(--panel);
  display:flex;gap:8px;
}
.btn-add{
  flex:1;background:var(--accent);color:#060c0a;font-weight:600;font-size:13px;
  padding:9px;border-radius:var(--radius);border:none;cursor:pointer;
  font-family:'Geist',sans-serif;transition:all .15s;
}
.btn-add:hover{background:#00ffb3}
.btn-add:disabled{background:#0d2a1e;color:#1a4030;cursor:not-allowed}

/* ── Section Cards ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.section-head{
  padding:9px 14px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);background:var(--surface2);
}
.section-icon{
  width:20px;height:20px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:11px;flex-shrink:0;
}
.icon-device {background:#0d2a3d;color:var(--blue)}
.icon-iface  {background:#0d2a1e;color:var(--accent)}
.icon-net    {background:#1e1a2d;color:var(--violet)}
.icon-mac    {background:#2a1d0a;color:var(--amber)}
.section-title{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--label)}
.section-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--label);font-weight:500;letter-spacing:.02em}
.field label .req{color:var(--red);margin-left:2px}
.field label .opt{color:var(--muted);font-size:10px;margin-left:4px}
input[type=text],input[type=password],select{
  width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;
  padding:7px 10px;color:var(--text);font-family:'Geist Mono',monospace;font-size:11px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,158,255,.1)}
input::placeholder{color:var(--muted)}
select option{background:var(--surface2)}
.hint-text{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Right Panel ── */
.right-panel{display:flex;flex-direction:column;overflow:hidden}
.panel-tabs{
  display:flex;border-bottom:1px solid var(--border);background:var(--panel);
  padding:0 16px;gap:2px;flex-shrink:0;
}
.tab{
  font-family:'Geist Mono',monospace;font-size:11px;padding:11px 14px;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:12px}
.tab-content.active{display:flex}

/* ── Queue ── */
.queue-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.queue-toolbar-left{display:flex;align-items:center;gap:8px}
.badge{
  font-family:'Geist Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border2);color:var(--label);
}
.toolbar-btns{display:flex;gap:6px}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:5px}
.btn-outline{background:var(--surface);border:1px solid var(--border2);color:var(--label)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-run{background:var(--accent);color:#060c0a;font-weight:600}
.btn-run:hover{background:#00ffb3}
.btn-run:disabled{background:#0d2a1e;color:#1a4030;cursor:not-allowed}

/* Progress */
.progress-wrap{display:none}
.progress-label{font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:1px;transition:width .3s}

/* Queue items */
#queue-list{display:flex;flex-direction:column;gap:6px}
.queue-item{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:11px 14px;display:grid;grid-template-columns:1fr auto;gap:8px;
  align-items:start;transition:border-color .2s;
}
.queue-item.success{border-color:#1a5c37;background:#050f09}
.queue-item.error  {border-color:#5c1a1a;background:#0f0505}
.queue-item.running{border-color:var(--blue);background:#050f1a}
.queue-name{font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:var(--text)}
.queue-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.queue-tag{
  font-family:'Geist Mono',monospace;font-size:10px;padding:1px 7px;border-radius:4px;
  border:1px solid var(--border2);color:var(--label);background:var(--surface2);
}
.queue-tag.tag-type  {border-color:#1a3d5c;color:var(--blue);background:#050f1a}
.queue-tag.tag-iface {border-color:#0a2e1a;color:var(--accent);background:#030f07}
.queue-tag.tag-ip    {border-color:#1e1028;color:var(--violet);background:#0a060f}
.queue-tag.tag-mac   {border-color:#2a1d0a;color:var(--amber);background:#0f0a03}
.queue-err{font-size:10px;color:var(--red);font-family:'Geist Mono',monospace;margin-top:4px}
.queue-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.queue-status{
  font-family:'Geist Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;
}
.queue-status.pending{background:var(--surface2);color:var(--muted)}
.queue-status.success{background:#061a10;color:var(--accent);border:1px solid #1a5c37}
.queue-status.error  {background:#1a0606;color:var(--red);border:1px solid #5c1a1a}
.queue-status.running{background:#05101a;color:var(--blue);border:1px solid #1a3d5c}
.icon-btn{
  background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);
  cursor:pointer;padding:3px 7px;font-size:11px;transition:all .15s;
}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.empty-state{
  text-align:center;padding:48px 24px;color:var(--muted);font-size:12px;
  font-family:'Geist Mono',monospace;line-height:1.8;border:1px dashed var(--border);
  border-radius:var(--radius);
}

/* Log */
#log-output{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;
  font-family:'Geist Mono',monospace;font-size:10px;height:100%;min-height:300px;
  overflow-y:auto;line-height:1.7;
}
.log-line{display:flex;gap:10px}
.log-time{color:var(--muted);flex-shrink:0}
.log-ok  {color:var(--accent)}
.log-err {color:var(--red)}
.log-info{color:var(--blue)}
.log-warn{color:var(--amber)}

/* Spinner */
.spinner{
  display:inline-block;width:11px;height:11px;border:2px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{
  position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:10px 16px;font-size:12px;max-width:320px;
  opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;z-index:999;
}
#toast.show{opacity:1;transform:translateY(0)}
#toast.toast-ok {border-color:#1a5c37;color:var(--accent)}
#toast.toast-err{border-color:#5c1a1a;color:var(--red)}

/* Scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Iface loading inline */
.field-label-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.field-label-row label{margin:0}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/></svg>
    NetBox <span style="opacity:.4;margin:0 4px">/</span> Importer
  </div>
  <div class="logo-sep"></div>
  <div class="conn-area">
    <div class="conn-inputs">
      <input type="text" id="nb-url" placeholder="NetBox URL (leer = diese Seite)" style="width:210px">
      <input type="text" id="nb-user" placeholder="Benutzername" style="width:120px">
      <input type="password" id="nb-pass" placeholder="Passwort" style="width:110px">
    </div>

    <button class="btn btn-conn" onclick="testConnection()">
      <span id="test-spinner" style="display:none" class="spinner"></span>
      Verbinden
    </button>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Hell/Dunkel wechseln">🌙</button>
    <div id="conn-badge"><div class="dot"></div><span id="conn-text">Offline</span></div>
  </div>
</header>

<!-- ── Workspace ── -->
<div class="workspace">

  <!-- ── Left: Form Panel ── -->
  <div class="form-panel">
    <div class="form-scroll">

      <!-- SECTION: Gerät -->
      <div class="section">
        <div class="section-head">
          <div class="section-icon icon-device">⬡</div>
          <div class="section-title">Gerät</div>
        </div>
        <div class="section-body">
          <div class="row-2">
            <div class="field">
              <label>Name<span class="req">*</span></label>
              <input type="text" id="f-name" placeholder="z.B. SW-CORE-01">
            </div>
            <div class="field">
              <label>Seriennummer<span class="opt">optional</span></label>
              <input type="text" id="f-serial" placeholder="SN-123456">
            </div>
          </div>
          <div class="row-2">
            <div class="field">
              <label>Site<span class="req">*</span></label>
              <select id="f-site"><option value="">— auswählen —</option></select>
            </div>
            <div class="field">
              <label>Tenant<span class="opt">optional</span></label>
              <select id="f-tenant"><option value="">— optional —</option></select>
            </div>
          </div>
          <div class="row-2">
            <div class="field">
              <label>Device Type<span class="req">*</span></label>
              <select id="f-dtype" onchange="loadInterfaceTemplates()"><option value="">— auswählen —</option></select>
            </div>
            <div class="field">
              <label>Device Role<span class="req">*</span></label>
              <select id="f-role"><option value="">— auswählen —</option></select>
            </div>
          </div>
          <div class="field" style="max-width:160px">
            <label>Status</label>
            <select id="f-status">
              <option value="active">Active</option>
              <option value="planned">Planned</option>
              <option value="staged">Staged</option>
              <option value="failed">Failed</option>
              <option value="inventory">Inventory</option>
              <option value="decommissioning">Decommissioning</option>
            </select>
          </div>
        </div>
      </div>

      <!-- SECTION: Interface & MAC -->
      <div class="section">
        <div class="section-head">
          <div class="section-icon icon-iface">⇄</div>
          <div class="section-title">Interface &amp; MAC</div>
        </div>
        <div class="section-body">
          <div class="field">
            <div class="field-label-row">
              <label>Interface<span class="req">*</span></label>
              <span id="iface-loading" style="display:none"><span class="spinner"></span></span>
            </div>
            <select id="f-iface" disabled>
              <option value="">— zuerst Device Type wählen —</option>
            </select>
            <div class="hint-text" id="iface-hint" style="display:none"></div>
          </div>
          <div class="row-2">
            <div class="field">
              <label>MAC Adresse<span class="opt">optional</span></label>
              <input type="text" id="f-mac" placeholder="AA:BB:CC:DD:EE:FF">
            </div>
            <div class="field">
              <label>MAC Description<span class="opt">optional</span></label>
              <input type="text" id="f-mac-desc" placeholder="z.B. Zutrittssystem XXXX">
            </div>
          </div>
          <div id="cfgroup-wrap" style="display:none">
            <div class="field">
              <div class="field-label-row">
                <label>MAC cf_group<span class="opt">optional</span></label>
                <span id="cfgroup-loading" style="display:none"><span class="spinner"></span></span>
              </div>
              <select id="f-cfgroup"><option value="">— optional —</option></select>
            </div>
          </div>
        </div>
      </div>

      <!-- SECTION: IP / Netzwerk -->
      <div class="section">
        <div class="section-head">
          <div class="section-icon icon-net">◈</div>
          <div class="section-title">IP / Netzwerk</div>
        </div>
        <div class="section-body">
          <div class="row-2">
            <div class="field">
              <label>IP Adresse / Prefix<span class="req">*</span></label>
              <input type="text" id="f-ip" placeholder="192.168.1.1/24">
            </div>
            <div class="field">
              <label>IP Status</label>
              <select id="f-ipstatus">
                <option value="active">Active</option>
                <option value="reserved">Reserved</option>
                <option value="dhcp">DHCP</option>
                <option value="slaac">SLAAC</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>VRF<span class="opt">optional</span></label>
            <select id="f-vrf"><option value="">— optional —</option></select>
          </div>
        </div>
      </div>

    </div><!-- /form-scroll -->

    <div class="form-footer">
      <button class="btn-add" onclick="addToQueue()" id="btn-add" disabled>
        + Zur Import-Queue hinzufügen
      </button>
    </div>
  </div><!-- /form-panel -->

  <!-- ── Right: Queue + Log ── -->
  <div class="right-panel">
    <div class="panel-tabs">
      <div class="tab active" onclick="switchTab('queue')">Import Queue</div>
      <div class="tab" onclick="switchTab('log')">Activity Log</div>
    </div>

    <!-- Queue Tab -->
    <div class="tab-content active" id="tab-queue">
      <div class="queue-toolbar">
        <div class="queue-toolbar-left">
          <span style="font-family:'Geist Mono',monospace;font-size:11px;color:var(--label)">Queue</span>
          <span class="badge" id="queue-count">0 Geräte</span>
        </div>
        <div class="toolbar-btns">
          <button class="btn btn-sm btn-outline" onclick="clearQueue()">Leeren</button>
          <button class="btn btn-sm btn-run" onclick="runImport()" id="btn-import" disabled>
            <span id="import-spinner" style="display:none" class="spinner"></span>
            Alle importieren
          </button>
        </div>
      </div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label" id="progress-label">0 / 0</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div id="queue-list">
        <div class="empty-state">Keine Geräte in der Queue.<br>Formular ausfüllen und hinzufügen.</div>
      </div>
    </div>

    <!-- Log Tab -->
    <div class="tab-content" id="tab-log">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-family:'Geist Mono',monospace;font-size:11px;color:var(--label)">Activity Log</span>
        <button class="btn btn-sm btn-outline" onclick="clearLog()">Leeren</button>
      </div>
      <div id="log-output"></div>
    </div>
  </div>

</div><!-- /workspace -->

<div id="toast"></div>

<script>

// ─── State ────────────────────────────────────────────────────────────────────
let queue   = [];
let connected = false;
let nbUrl   = '';
let nbToken = '';

// ─── API Helper ───────────────────────────────────────────────────────────────
async function nbFetch(path, method = 'GET', body = null) {
  const url = nbUrl.replace(/\/$/, '') + path;
  const opts = {
    method,
    headers: {
      'Authorization': `Token ${nbToken}`,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

// ─── Connection ───────────────────────────────────────────────────────────────
async function testConnection() {
  const rawUrl = document.getElementById('nb-url').value.trim();
  // Wenn leer: gleiche Origin verwenden (kein CORS wenn auf NetBox-Server gehostet)
  nbUrl = rawUrl || (window.location.origin);
  const user = document.getElementById('nb-user').value.trim();
  const pass = document.getElementById('nb-pass').value;
  if (!user || !pass) { showToast('Benutzername und Passwort eingeben', 'err'); return; }

  const sp = document.getElementById('test-spinner');
  sp.style.display = '';
  setBadge('', 'Anmelden…');

  try {
    // Token via NetBox login provisioning holen
    log(`→ Authentifiziere "${user}" gegen ${nbUrl || 'diese Seite'}…`, 'info');
    const res = await fetch(nbUrl.replace(/\/$/, '') + '/api/users/tokens/provision/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || err.non_field_errors?.[0] || `HTTP ${res.status}`);
    }
    const data = await res.json();
    nbToken = data.key;
    // Passwort-Feld leeren
    document.getElementById('nb-pass').value = '';
    log(`  Token erhalten (${nbToken.substring(0,8)}…)`, 'ok');

    // Verbindung verifizieren
    await nbFetch('/api/status/');
    connected = true;
    setBadge('ok', user);
    log(`Angemeldet als "${user}"`, 'ok');
    await loadDropdowns();
    document.getElementById('btn-add').disabled = false;
    showToast(`Angemeldet als ${user} ✓`, 'ok');
  } catch(e) {
    connected = false;
    nbToken = '';
    setBadge('err', 'Fehler');
    log('Anmeldung fehlgeschlagen: ' + e.message, 'err');
    showToast('Anmeldung fehlgeschlagen: ' + e.message, 'err');
  } finally { sp.style.display = 'none'; }
}

async function loadDropdowns() {
  log('Lade Device Types, Roles, Sites, Tenants…', 'info');
  const [types, roles, sites, tenants, vrfs] = await Promise.all([
    nbFetch('/api/dcim/device-types/?limit=200'),
    nbFetch('/api/dcim/device-roles/?limit=200'),
    nbFetch('/api/dcim/sites/?limit=200'),
    nbFetch('/api/tenancy/tenants/?limit=200'),
    nbFetch('/api/ipam/vrfs/?limit=200'),
  ]);
  populateSelect('f-dtype',  types.results,   d => ({ v: d.id, l: `${d.manufacturer.name} – ${d.model}` }));
  populateSelect('f-role',   roles.results,   d => ({ v: d.id, l: d.name }));
  populateSelect('f-site',   sites.results,   d => ({ v: d.id, l: d.name }));
  populateSelect('f-tenant', tenants.results, d => ({ v: d.id, l: d.name }));
  populateSelect('f-vrf',    vrfs.results,    d => ({ v: d.id, l: d.name + (d.rd ? ' ('+d.rd+')' : '') }));
  log(`${types.results.length} Types, ${roles.results.length} Roles, ${sites.results.length} Sites, ${tenants.results.length} Tenants, ${vrfs.results.length} VRFs geladen`, 'ok');

  // cf_group Choices fuer MAC-Adressen laden
  await loadCfGroupChoices();
}

function populateSelect(id, items, fn) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">— auswählen —</option>';
  items.sort((a,b) => fn(a).l.localeCompare(fn(b).l)).forEach(i => {
    const {v, l} = fn(i);
    sel.innerHTML += `<option value="${v}">${l}</option>`;
  });
}

async function loadCfGroupChoices() {
  const loading = document.getElementById('cfgroup-loading');
  loading.style.display = '';
  try {
    // Versuche beide API-Varianten (NetBox 3.x content_types / 4.x object_types)
    let cfField = null;
    for (const param of ['object_types', 'content_types']) {
      try {
        const res = await nbFetch(`/api/extras/custom-fields/?${param}=dcim.macaddress&limit=100`);
        log(`cf_group Suche via ${param}: ${res.results.length} Custom Fields gefunden`, 'info');
        // Suche nach Feld mit name=cf_group oder mit choices
        // NetBox CF Name ist "group", API-Key ist "cf_group"
        const found = res.results.find(f => f.name === 'group') || res.results.find(f => f.name === 'cf_group') || res.results.find(f => f.choices && f.choices.length);
        if (found) { cfField = found; break; }
        // Falls nichts gefunden, trotzdem alle loggen
        if (res.results.length) {
          res.results.forEach(f => log(`  CF: ${f.name} (type:${f.type?.value||f.type}, choices:${(f.choices||[]).length})`, 'info'));
        }
      } catch(e2) { log(`  ${param} Versuch fehlgeschlagen: ${e2.message}`, 'warn'); }
    }

    if (!cfField) {
      log('Kein cf_group Custom Field gefunden – Feld wird ausgeblendet', 'warn');
      document.getElementById('cfgroup-wrap').style.display = 'none';
      return;
    }

    log(`CF gefunden: "${cfField.name}", type: ${cfField.type?.value||cfField.type}`, 'info');
    // NetBox 3.6+: Choices in choice_set ausgelagert
    let choices = cfField.choices || [];
    if (!choices.length && cfField.choice_set) {
      try {
        // choice_set hat eine ID oder URL
        const csId = cfField.choice_set.id || (cfField.choice_set.url || '').split('/').filter(Boolean).pop();
        if (csId) {
          const csData = await nbFetch(`/api/extras/custom-field-choice-sets/${csId}/`);
          // Choices kommen als [[value,label],...] oder [value,...]
          const raw = csData.choices || csData.extra_choices || [];
          choices = raw.map(c => Array.isArray(c) ? { value: c[0], label: c[1] || c[0] } : { value: c, label: c });
          log(`choice_set "${csData.name}": ${choices.length} Choices geladen`, 'ok');
        }
      } catch(e3) { log(`choice_set Ladefehler: ${e3.message}`, 'warn'); }
    }
    // cfField.type = multi-select?
    document.getElementById('f-cfgroup').dataset.multi = (cfField.type?.value||cfField.type||'').includes('multi') ? '1' : '0';
    const sel = document.getElementById('f-cfgroup');
    sel.innerHTML = '<option value="">— optional —</option>';
    choices.forEach(c => {
      const val = typeof c === 'object' ? String(c.value ?? c) : String(c);
      const lbl = typeof c === 'object' ? String(c.label || c.value || c) : String(c);
      sel.innerHTML += `<option value="${esc(val)}">${esc(lbl)}</option>`;
    });
    // Speichere den echten API-Feldnamen im select als data-Attribut
    sel.dataset.cfkey = cfField.name;
    document.getElementById('cfgroup-wrap').style.display = '';
    log(`"${cfField.name}": ${choices.length} Choices geladen`, 'ok');
  } catch(e) {
    log('cf_group Ladefehler: ' + e.message, 'warn');
    document.getElementById('cfgroup-wrap').style.display = 'none';
  } finally {
    loading.style.display = 'none';
  }
}

async function loadInterfaceTemplates() {
  const dtypeId = document.getElementById('f-dtype').value;
  const sel     = document.getElementById('f-iface');
  const loading = document.getElementById('iface-loading');
  const hint    = document.getElementById('iface-hint');

  // Reset
  sel.innerHTML = '<option value="">— auswählen —</option>';
  sel.disabled  = true;
  hint.style.display = 'none';

  if (!dtypeId) return;

  loading.style.display = '';
  try {
    const data = await nbFetch(`/api/dcim/interface-templates/?device_type_id=${dtypeId}&limit=200`);
    const templates = data.results;
    if (!templates.length) {
      sel.innerHTML = '<option value="">Keine Templates vorhanden</option>';
      hint.textContent = 'Dieser Device Type hat keine Interface-Templates.';
      hint.style.display = '';
      log(`Device Type ${dtypeId}: Keine Interface-Templates gefunden`, 'warn');
    } else {
      templates.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
      templates.forEach(t => {
        const opt = document.createElement('option');
        opt.value       = t.name;
        opt.textContent = `${t.name}  [${t.type?.label || t.type || ''}]`;
        opt.dataset.type = t.type?.value || t.type || '1000base-t';
        sel.appendChild(opt);
      });
      sel.disabled = false;
      hint.textContent = `${templates.length} Interface${templates.length !== 1 ? 's' : ''} verfügbar`;
      hint.style.display = '';
      log(`${templates.length} Interface-Templates für Device Type ${dtypeId} geladen`, 'ok');
    }
  } catch(e) {
    sel.innerHTML = '<option value="">Fehler beim Laden</option>';
    hint.textContent = 'Fehler: ' + e.message;
    hint.style.display = '';
    log('Interface-Templates Ladefehler: ' + e.message, 'err');
  } finally {
    loading.style.display = 'none';
  }
}


function addToQueue() {
  const get = id => document.getElementById(id).value.trim();
  const getName = id => { const s = document.getElementById(id); return s.options[s.selectedIndex]?.text || ''; };

  const ifaceSel  = document.getElementById('f-iface');
  const ifaceOpt  = ifaceSel.options[ifaceSel.selectedIndex];
  const ifaceType = ifaceOpt?.dataset?.type || '1000base-t';

  const item = {
    id:         Date.now(),
    name:       get('f-name'),
    site:       get('f-site'),
    siteName:   getName('f-site'),
    dtype:      get('f-dtype'),
    dtName:     getName('f-dtype'),
    role:       get('f-role'),
    roleName:   getName('f-role'),
    tenant:     get('f-tenant'),
    tenantName: getName('f-tenant'),
    serial:     get('f-serial'),
    status:     get('f-status'),
    iface:      get('f-iface'),
    ifaceType,
    mac:        get('f-mac'),
    cfGroup:    get('f-cfgroup'),
    cfGroupKey: document.getElementById('f-cfgroup').dataset.cfkey || 'group',
    macDesc:    get('f-mac-desc'),
    ip:         get('f-ip'),
    ipStatus:   get('f-ipstatus'),
    vrf:        get('f-vrf'),
    vrfName:    getName('f-vrf'),
    state:      'pending',
    error:      null,
  };

  if (!item.name || !item.site || !item.dtype || !item.role || !item.iface || !item.ip) {
    showToast('Pflichtfelder ausfüllen: Name, Site, Type, Role, Interface, IP', 'err');
    return;
  }
  if (!isValidIP(item.ip)) { showToast('Ungültige IP (Format: x.x.x.x/xx)', 'err'); return; }
  if (item.mac && !isValidMAC(item.mac)) { showToast('Ungültige MAC (Format: AA:BB:CC:DD:EE:FF)', 'err'); return; }

  queue.push(item);
  renderQueue();
  updateImportBtn();
  showToast(`"${item.name}" zur Queue hinzugefügt`, 'ok');
  document.getElementById('f-name').value = '';
  document.getElementById('f-mac').value  = '';
  document.getElementById('f-ip').value   = '';
  // Interface-Auswahl zurücksetzen
  const ifSel = document.getElementById('f-iface');
  ifSel.selectedIndex = 0;
}

function removeFromQueue(id) {
  queue = queue.filter(i => i.id !== id);
  renderQueue();
  updateImportBtn();
}

function clearQueue() {
  queue = [];
  renderQueue();
  updateImportBtn();
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  document.getElementById('queue-count').textContent = `${queue.length} Gerät${queue.length!==1?'e':''}`;
  if (!queue.length) {
    el.innerHTML = '<div class="empty-state">Keine Geräte in der Queue.<br>Formular ausfüllen und hinzufügen.</div>';
    return;
  }
  el.innerHTML = queue.map(i => `
    <div class="queue-item ${i.state}" id="qi-${i.id}">
      <div>
        <div class="queue-name">${esc(i.name)}</div>
        <div class="queue-tags">
          <span class="queue-tag tag-type">${esc(i.dtName)}</span>
          <span class="queue-tag">${esc(i.roleName)}</span>
          <span class="queue-tag">${esc(i.siteName)}</span>
          ${i.tenantName ? `<span class="queue-tag">${esc(i.tenantName)}</span>` : ''}
          ${i.serial     ? `<span class="queue-tag">SN: ${esc(i.serial)}</span>` : ''}
          <span class="queue-tag tag-iface">${esc(i.iface)}</span>
          ${i.mac     ? `<span class="queue-tag tag-mac">${esc(i.mac)}${i.cfGroup ? ' · '+esc(i.cfGroup) : ''}</span>` : ''}
          <span class="queue-tag tag-ip">${esc(i.ip)}${i.vrfName ? ' · '+esc(i.vrfName) : ''}</span>
        </div>
        ${i.error ? `<div class="queue-err">✗ ${esc(i.error)}</div>` : ''}
      </div>
      <div class="queue-right">
        <span class="queue-status ${i.state}">${stateLabel(i.state)}</span>
        ${i.state === 'pending' || i.state === 'error'
          ? `<button class="icon-btn" onclick="removeFromQueue(${i.id})" title="Entfernen">✕</button>` : ''}
      </div>
    </div>`).join('');
}

function stateLabel(s) {
  return {pending:'Wartend', running:'Läuft…', success:'Importiert', error:'Fehler'}[s] || s;
}

function updateImportBtn() {
  const btn = document.getElementById('btn-import');
  btn.disabled = !connected || queue.filter(i => i.state === 'pending' || i.state === 'error').length === 0;
}

// ─── Import ───────────────────────────────────────────────────────────────────
async function runImport() {
  const items = queue.filter(i => i.state === 'pending' || i.state === 'error');
  if (!items.length) return;

  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('import-spinner').style.display = '';
  document.getElementById('btn-import').disabled = true;

  let done = 0;
  for (const item of items) {
    item.state = 'running';
    renderQueue();
    updateProgress(done, items.length);
    try {
      await importDevice(item);
      item.state = 'success';
      item.error = null;
      log(`✓ ${item.name} erfolgreich importiert`, 'ok');
    } catch(e) {
      item.state = 'error';
      item.error = e.message;
      log(`✗ ${item.name}: ${e.message}`, 'err');
    }
    done++;
    renderQueue();
    updateProgress(done, items.length);
  }

  document.getElementById('import-spinner').style.display = 'none';
  updateImportBtn();

  const ok  = queue.filter(i => i.state === 'success').length;
  const err = queue.filter(i => i.state === 'error').length;
  showToast(`Import abgeschlossen: ${ok} ✓  ${err ? err+' ✗' : ''}`, err ? 'err' : 'ok');
  if (!err) setTimeout(() => { document.getElementById('progress-wrap').style.display = 'none'; }, 3000);
}

async function importDevice(item) {
  // 1. Device erstellen
  log(`→ Erstelle Device "${item.name}"…`, 'info');
  const devBody = {
    name:        item.name,
    device_type: parseInt(item.dtype),
    role:        parseInt(item.role),
    site:        parseInt(item.site),
    status:      item.status,
  };
  if (item.tenant) devBody.tenant = parseInt(item.tenant);
  if (item.serial) devBody.serial = item.serial;
  const dev = await nbFetch('/api/dcim/devices/', 'POST', devBody);
  const devId = dev.id;
  log(`  Device ID: ${devId}`, 'info');

  // 2. Interface: prüfen ob bereits durch Template erstellt
  log(`→ Suche Interface "${item.iface}" auf Device ${devId}…`, 'info');
  const existing = await nbFetch(`/api/dcim/interfaces/?device_id=${devId}&name=${encodeURIComponent(item.iface)}`);
  let ifaceId;

  if (existing.results && existing.results.length > 0) {
    // Interface existiert bereits (aus Device-Type-Template) → nur patchen
    ifaceId = existing.results[0].id;
    log(`  Interface bereits vorhanden (ID: ${ifaceId}), wird aktualisiert…`, 'warn');
    await nbFetch(`/api/dcim/interfaces/${ifaceId}/`, 'PATCH', { type: item.ifaceType || '1000base-t' });
    log(`  Interface aktualisiert`, 'ok');
  } else {
    // Interface existiert nicht → neu erstellen
    log(`  Interface nicht gefunden, wird erstellt…`, 'info');
    const ifBody = {
      device: devId,
      name:   item.iface,
      type:   item.ifaceType || '1000base-t',
    };
    const iface = await nbFetch('/api/dcim/interfaces/', 'POST', ifBody);
    ifaceId = iface.id;
    log(`  Interface erstellt (ID: ${ifaceId})`, 'ok');
  }

  // 2b. MAC Adresse als eigenes Objekt anlegen (NetBox 4.x)
  if (item.mac) {
    log(`→ Lege MAC-Adresse "${item.mac.toUpperCase()}" an…`, 'info');
    try {
      const macBody = {
        mac_address:          item.mac.toUpperCase(),
        assigned_object_type: 'dcim.interface',
        assigned_object_id:   ifaceId,
        is_primary:           true,
      };
      if (item.macDesc) macBody.description = item.macDesc;
      if (item.cfGroup) macBody.custom_fields = { [item.cfGroupKey || 'group']: [item.cfGroup] };
      const macObj = await nbFetch('/api/dcim/mac-addresses/', 'POST', macBody);
      log(`  MAC-Adresse angelegt (ID: ${macObj.id})`, 'ok');
    } catch(e) {
      // Fallback: ältere NetBox-Version, MAC direkt auf Interface setzen
      if (e.message.includes('404') || e.message.includes('not found') || e.message.includes('No route')) {
        log(`  /dcim/mac-addresses/ nicht verfügbar, setze MAC direkt auf Interface…`, 'warn');
        await nbFetch(`/api/dcim/interfaces/${ifaceId}/`, 'PATCH', { mac_address: item.mac.toUpperCase() });
        log(`  MAC direkt auf Interface gesetzt`, 'ok');
      } else {
        throw e;
      }
    }
  }

  // 3. IP Adresse erstellen
  log(`→ Erstelle IP "${item.ip}"…`, 'info');
  const ipBody = {
    address:              item.ip,
    status:               item.ipStatus,
    assigned_object_type: 'dcim.interface',
    assigned_object_id:   ifaceId,
  };
  if (item.tenant) ipBody.tenant = parseInt(item.tenant);
  if (item.vrf)    ipBody.vrf    = parseInt(item.vrf);
  const ipObj = await nbFetch('/api/ipam/ip-addresses/', 'POST', ipBody);
  const ipId = ipObj.id;
  log(`  IP ID: ${ipId}`, 'info');

  // 4. Primary IP setzen
  log(`→ Setze Primary IP…`, 'info');
  const isV6 = item.ip.includes(':');
  await nbFetch(`/api/dcim/devices/${devId}/`, 'PATCH', {
    [isV6 ? 'primary_ip6' : 'primary_ip4']: ipId,
  });
  log(`  Primary IP gesetzt`, 'ok');
}

function updateProgress(done, total) {
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width  = `${total ? (done/total)*100 : 0}%`;
}

// ─── Log ──────────────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const el = document.getElementById('log-output');
  const now = new Date().toLocaleTimeString('de-CH');
  el.innerHTML += `<div class="log-line"><span class="log-time">[${now}]</span><span class="log-${type}">${esc(msg)}</span></div>`;
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('log-output').innerHTML = ''; }

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function setBadge(state, text) {
  const b = document.getElementById('conn-badge');
  b.className = state;
  document.getElementById('conn-text').textContent = text;
}

let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isValidIP(ip) {
  return /^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$|^[0-9a-fA-F:]+\/\d{1,3}$/.test(ip);
}
function isValidMAC(mac) {
  return /^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$/.test(mac);
}

// ─── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('btn-theme').textContent = isLight ? '🌑' : '🌙';
  localStorage.setItem('nb-importer-theme', isLight ? 'light' : 'dark');
}
// Gespeichertes Theme laden
(function() {
  const saved = localStorage.getItem('nb-importer-theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('btn-theme');
      if (btn) btn.textContent = '🌑';
    });
  }
})();

// ─── Init ─────────────────────────────────────────────────────────────────────
log('NetBox Device Importer bereit.', 'info');
log('NetBox URL und Token eingeben, dann "Verbindung testen".', 'info');

</script>
